apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: devops-observability
  labels:
    app: otel-collector
    component: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        component: observability
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.93.0
        args:
          - "--config=/conf/otel-collector-config.yaml"
        env:
          - name: K8S_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: K8S_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: K8S_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        ports:
          - name: otlp
            containerPort: 4317
            protocol: TCP
          - name: otlp-http
            containerPort: 4318
            protocol: TCP
          - name: otlp-udp
            containerPort: 4319
            protocol: UDP
          - name: prometheus
            containerPort: 8888
            protocol: TCP
          - name: health
            containerPort: 13133
            protocol: TCP
          - name: zpages
            containerPort: 55679
            protocol: TCP
        volumeMounts:
          - name: config-volume
            mountPath: /conf
          - name: varlog
            mountPath: /var/log/app
            readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: health
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config-volume
        configMap:
          name: otel-collector-config
      - name: varlog
        hostPath:
          path: /var/log/app
          type: DirectoryOrCreate
