apiVersion: v1
kind: Service
metadata:
  name: otel-collector-service
  namespace: devops-observability
  labels:
    app: otel-collector
    component: observability
spec:
  selector:
    app: otel-collector
  ports:
  - name: otlp
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: otlp-udp
    port: 4319
    targetPort: 4319
    protocol: UDP
  - name: prometheus
    port: 8888
    targetPort: 8888
    protocol: TCP
  - name: health
    port: 13133
    targetPort: 13133
    protocol: TCP
  - name: zpages
    port: 55679
    targetPort: 55679
    protocol: TCP
