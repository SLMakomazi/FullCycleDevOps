# OpenTelemetry Collector Configuration
# Receives, processes, and exports traces, metrics, and logs

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679
  memory_ballast:
    size_mib: 512

receivers:
  # OTLP receiver for traces, metrics, and logs
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus receiver for metrics scraping
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['localhost:8888']
        - job_name: 'devops-api'
          static_configs:
            - targets: ['api:8080']
          metrics_path: '/actuator/prometheus'
          scrape_interval: 15s

  # Filelog receiver for log collection
  filelog:
    include:
      - /var/log/app/*.log
      - /var/log/containers/*.log
    start_at: beginning
    include_file_name: false
    include_file_path: true
    operators:
      - type: router
        routes:
          - output: parse_json
            expr: 'body matches "^\\{.*\\}$"'
      - type: json_parser
        output: extract_metadata
        timestamp:
          parse_from: attributes.timestamp
          layout: '%Y-%m-%dT%H:%M:%S.%fZ'
      - type: regex_parser
        regex: '^(?P<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\s+\[(?P<thread>[^\]]+)\]\s+(?P<level>\w+)\s+(?P<logger>\S+)\s+-\s+(?P<message>.*)$'
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%d %H:%M:%S'
        severity:
          parse_from: attributes.level
        body:
          extract_from: attributes.message

processors:
  # Batch processor for better performance
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 1024
    spike_limit_mib: 512

  # Resource detection and enrichment
  resource:
    attributes:
      - key: environment
        value: "docker"
        action: upsert
      - key: cluster
        value: "devops-cluster"
        action: upsert

  # Resource detection from host
  resourcedetection:
    detectors: [env, gcp]
    timeout: 10s
    override: false

  # Attributes processor for filtering and transformation
  attributes:
    actions:
      - key: service.name
        action: upsert
        value: "devops-observability-api"
      - key: service.version
        action: upsert
        value: "1.0.0"
      - key: telemetry.sdk.name
        action: delete
      - key: telemetry.sdk.language
        action: delete
      - key: telemetry.sdk.version
        action: delete

  # Metric transforms
  metricstransform:
    transforms:
      - include: .*
        match_type: regexp
        action: update
        new_name: ${1}_total
        operations:
          - action: aggregate_labels
            label_set: [service.name, service.version, environment]

  # Span processor for traces
  span:
    name:
      from_attributes: [http.target]
      to_attributes: [http.method, http.target]

exporters:
  # Export traces to Tempo
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Export metrics to Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otel"
    const_labels:
      environment: "docker"

  # Export logs to Loki (or could be Graylog)
  loki:
    endpoint: "http://graylog:3100/loki/api/v1/push"
    labels:
      job: "otel-collector"
      environment: "docker"

  # Export to stdout for debugging
  logging:
    loglevel: info

  # Export metrics to Prometheus remote write (for Grafana Cloud)
  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    headers:
      Content-Type: "application/x-protobuf"

service:
  extensions: [health_check, zpages, memory_ballast]
  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource, attributes]
      exporters: [otlp, logging]

    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resource, attributes, metricstransform]
      exporters: [prometheus, prometheusremotewrite, logging]

    # Logs pipeline
    logs:
      receivers: [otlp, filelog]
      processors: [memory_limiter, batch, resource, attributes]
      exporters: [loki, logging]
