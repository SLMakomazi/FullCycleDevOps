version: '3.8'

services:
  rancher:
    image: rancher/rancher:v2.8.0
    container_name: rancher-server
    ports:
      - "80:80"
      - "443:443"
    privileged: true
    environment:
      - CATTLE_BOOTSTRAP_PASSWORD=rancher123
    volumes:
      - rancher_data:/var/lib/rancher
    restart: unless-stopped
    command: --acme-domain localhost

volumes:
  rancher_data:
    driver: local

networks:
  default:
    driver: bridge
