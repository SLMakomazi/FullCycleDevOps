# Example Rancher Workload Configuration
# This demonstrates how to deploy the Spring Boot API using Rancher's workload management

apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api-rancher
  namespace: devops-observability
  labels:
    app: devops-api
    deployment: rancher-managed
    workload.user.cattle.io/workloadselector: deployment-devops-observability-devops-api-rancher
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-api
      workload.user.cattle.io/workloadselector: deployment-devops-observability-devops-api-rancher
  template:
    metadata:
      labels:
        app: devops-api
        deployment: rancher-managed
        workload.user.cattle.io/workloadselector: deployment-devops-observability-devops-api-rancher
    spec:
      containers:
      - name: devops-api
        image: devops-observability-api:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: uri
        - name: MONGODB_DATABASE
          value: "devops_observability"
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m -XX:+UseG1GC"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: api-logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: api-logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler

---
# Service for the Rancher-managed deployment
apiVersion: v1
kind: Service
metadata:
  name: devops-api-rancher-service
  namespace: devops-observability
  labels:
    app: devops-api
    deployment: rancher-managed
spec:
  selector:
    app: devops-api
    deployment: rancher-managed
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
  sessionAffinity: None

---
# HorizontalPodAutoscaler for automatic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-api-hpa
  namespace: devops-observability
  labels:
    app: devops-api
    deployment: rancher-managed
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-api-rancher
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
