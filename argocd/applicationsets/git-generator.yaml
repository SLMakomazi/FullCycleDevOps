# ArgoCD ApplicationSet for GitOps
# Automatically generates applications based on Git repository structure

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: devops-observability-appset
  namespace: argocd
  labels:
    app.kubernetes.io/name: devops-observability-appset
    app.kubernetes.io/component: gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/your-org/devops-observability.git
      revision: HEAD
      directories:
      - path: helm/*
      - path: k8s/*
  template:
    metadata:
      name: '{{path.basename}}-{{path.basenameNormalized}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{path.basename}}'
        app.kubernetes.io/component: gitops
        generated-by: applicationset
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/devops-observability.git
        targetRevision: HEAD
        path: '{{path}}'
        helm:
          valueFiles:
            - values.yaml
            - values-{{environment}}.yaml
          parameters:
            - name: environment
              value: '{{environment}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: devops-observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
  syncPolicy:
    preserveResourcesOnDeletion: false
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: environment-based-appset
  namespace: argocd
  labels:
    app.kubernetes.io/name: environment-based-appset
    app.kubernetes.io/component: gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/your-org/devops-observability.git
      revision: HEAD
      files:
      - path: environments/*/config.yaml
  template:
    metadata:
      name: '{{path[1]}}-{{name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{name}}'
        app.kubernetes.io/environment: '{{path[1]}}'
        app.kubernetes.io/component: gitops
        generated-by: applicationset
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/your-org/devops-observability.git
        targetRevision: '{{targetRevision}}'
        path: '{{path}}'
        helm:
          valueFiles:
            - values.yaml
            - 'values-{{path[1]}}.yaml'
          parameters:
            - name: environment
              value: '{{path[1]}}'
            - name: namespace
              value: '{{namespace}}'
      destination:
        server: '{{server}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: '{{automated.prune}}'
          selfHeal: '{{automated.selfHeal}}'
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: '{{retry.limit}}'
          backoff:
            duration: '{{retry.duration}}'
            factor: '{{retry.factor}}'
            maxDuration: '{{retry.maxDuration}}'
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-based-appset
  namespace: argocd
  labels:
    app.kubernetes.io/name: cluster-based-appset
    app.kubernetes.io/component: gitops
spec:
  generators:
  - git:
      repoURL: https://github.com/your-org/devops-observability.git
      revision: HEAD
      directories:
      - path: clusters/*
  - clusterDecisionResource:
      labelSelector:
        matchLabels:
          argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: '{{path.basename}}-{{name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/name: '{{path.basename}}'
        app.kubernetes.io/cluster: '{{name}}'
        app.kubernetes.io/component: gitops
        generated-by: applicationset
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/devops-observability.git
        targetRevision: HEAD
        path: '{{path}}'
        helm:
          valueFiles:
            - values.yaml
            - 'values-{{metadata.labels.environment}}.yaml'
      destination:
        server: '{{server}}'
        namespace: devops-observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
