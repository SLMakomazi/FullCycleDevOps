apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-fullcycle
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SLMakomazi/FullCycleDevOps.git
    targetRevision: HEAD
    path: k8s/local-wsl
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
  revisionHistoryLimit: 3