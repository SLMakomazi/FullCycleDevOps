# ArgoCD Installation Manifest
# GitOps deployment platform

apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    name: argocd
---
apiVersion: argoproj.io/v1alpha1
kind: ArgoCD
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/component: argocd
spec:
  server:
    grpc:
      web: true
    insecure: true
    route:
      enabled: true
    service:
      type: ClusterIP
  repo:
    mountsatoken: true
    serviceaccount: argocd-repo-server
    env:
      - name: AVP_TYPE
        value: "sops"
      - name: AVP_SOPS_KMS_KEY
        value: "arn:aws:kms:us-west-2:123456789012:key/12345678-1234-1234-1234-123456789012"
  dex:
    enabled: true
    config: |
      connectors:
        - type: oidc
          id: oidc
          name: OpenID Connect
          config:
            issuer: https://your-oidc-provider.com
            clientID: argocd
            clientSecret: $oidc.clientSecret
            requestedScopes: ["openid", "profile", "email", "groups"]
      staticClients:
        - id: argocd
          name: ArgoCD
          secret: $oidc.clientSecret
          redirectURIs:
            - http://localhost:8080/api/v1/session
            - http://localhost:8080/oidc/callback
  notifications:
    enabled: true
    notifiers:
      service.slack: |
        token: $slack-token
        username: argocd
        icon: ":argo:"
    triggers:
      - condition: app.status.operationState.phase in [Succeeded, Failed]
        description: Application syncing has succeeded
        enabled: true
        template: app-sync-status
        triggers:
          - on-sync-succeeded
          - on-sync-failed
  rbac:
    defaultPolicy: 'role:readonly'
    policy: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      g, argocd-admins, role:admin
      g, devops-team, role:readonly
    scopes: '[groups]'
  applicationSet:
    enabled: true
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
type: Opaque
data:
  # admin password: argocd123 (base64 encoded)
  admin.password: JGFyZ29jZCR2MTkkNjZwZjV6bVJ3c2p4Z0U3a0JQdE5QeG9oY3Z5R3Y1TjNjTQ==
  # admin password: argocd123 (bcrypt)
  admin.passwordMtime: MjAyNC0wMS0wMVQwMDowMDowMFo=
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-repo-server
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-repo-server
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-repo-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-repo-server
subjects:
- kind: ServiceAccount
  name: argocd-repo-server
  namespace: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-application-controller
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-application-controller
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-application-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-application-controller
subjects:
- kind: ServiceAccount
  name: argocd-application-controller
  namespace: argocd
