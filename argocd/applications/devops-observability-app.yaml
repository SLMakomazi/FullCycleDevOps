# ArgoCD Application for DevOps & Observability Platform
# GitOps deployment configuration

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-observability
  namespace: argocd
  labels:
    app.kubernetes.io/name: devops-observability
    app.kubernetes.io/component: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/devops-observability.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  revisionHistoryLimit: 3
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: monitoring-stack
    app.kubernetes.io/component: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/devops-observability.git
    targetRevision: main
    path: helm/monitoring
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: prometheus.enabled
          value: "true"
        - name: grafana.enabled
          value: "true"
        - name: grafana.adminPassword
          value: "admin123"
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: observability-stack
    app.kubernetes.io/component: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/devops-observability.git
    targetRevision: main
    path: helm/observability
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: tempo.enabled
          value: "true"
        - name: otelCollector.enabled
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-controller
  namespace: argocd
  labels:
    app.kubernetes.io/name: ingress-controller
    app.kubernetes.io/component: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/devops-observability.git
    targetRevision: main
    path: helm/traefik
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: ingress.enabled
          value: "true"
        - name: dashboard.enabled
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: application-services
  namespace: argocd
  labels:
    app.kubernetes.io/name: application-services
    app.kubernetes.io/component: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/devops-observability.git
    targetRevision: main
    path: helm/application
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: replicaCount
          value: "3"
        - name: image.tag
          value: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    hooks:
      - type: Sync
        hook: PostSync
        command: ["sh", "-c", "echo 'Application deployed successfully'"]
