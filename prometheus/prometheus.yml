global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'devops-observability-aspring'
    scheme: 'http'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:30086']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'spring-boot-api'
