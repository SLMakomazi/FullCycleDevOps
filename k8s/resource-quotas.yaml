# Resource Quotas for Production Environment
# Limits resource usage per namespace

apiVersion: v1
kind: ResourceQuota
metadata:
  name: devops-observability-quota
  namespace: devops-observability
  labels:
    app.kubernetes.io/name: resource-quota
    app.kubernetes.io/component: resource-management
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "20"
    pods: "30"
    services: "15"
    secrets: "20"
    configmaps: "20"
    count/services.loadbalancers: "2"
    count/services.nodeports: "0"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: devops-observability-limits
  namespace: devops-observability
  labels:
    app.kubernetes.io/name: limit-range
    app.kubernetes.io/component: resource-management
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container
  - max:
      storage: "50Gi"
    min:
      storage: "1Gi"
    type: PersistentVolumeClaim
