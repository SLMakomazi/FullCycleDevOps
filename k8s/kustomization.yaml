apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: fullcycle-api-base

resources:
- deployment.yaml
- service.yaml
- secrets.yaml

commonLabels:
  app.kubernetes.io/name: fullcycle-api
  app.kubernetes.io/component: backend
  app.kubernetes.io/part-of: fullcycle-devops

commonAnnotations:
  kustomize.config.k8s.io/version: "v1.0.0"

configMapGenerator:
- name: fullcycle-config
  literals:
  - SPRING_PROFILES_ACTIVE=kubernetes
  - MONGODB_DATABASE=devops_observability
  - JAVA_OPTS="-Xmx512m -Xms256m"
