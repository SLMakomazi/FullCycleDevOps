apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: devops-observability
data:
  mongo-init.js: |
    // Initialize MongoDB database and collections
    db = db.getSiblingDB('devops_observability');
    
    // Create application user
    db.createUser({
      user: 'app_user',
      pwd: 'app_password',
      roles: [
        {
          role: 'readWrite',
          db: 'devops_observability'
        }
      ]
    });
    
    // Create initial collection with validation
    db.createCollection('items', {
      validator: {
        $jsonSchema: {
          bsonType: 'object',
          required: ['name', 'createdAt'],
          properties: {
            name: {
              bsonType: 'string',
              minLength: 1,
              maxLength: 100
            },
            description: {
              bsonType: 'string',
              maxLength: 500
            },
            createdAt: {
              bsonType: 'date'
            },
            updatedAt: {
              bsonType: 'date'
            }
          }
        }
      }
    });
    
    print('MongoDB initialization completed');
