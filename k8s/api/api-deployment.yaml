apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api
  namespace: devops-observability
  labels:
    app: devops-api
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-api
  template:
    metadata:
      labels:
        app: devops-api
        component: backend
    spec:
      containers:
      - name: devops-api
        image: devops-observability-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: MONGODB_URI
          value: "mongodb://app_user:app_password@mongodb-service:27017/devops_observability"
        - name: MONGODB_DATABASE
          value: "devops_observability"
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m -XX:+UseG1GC"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: api-logs
          mountPath: /app/logs
      volumes:
      - name: api-logs
        emptyDir: {}
