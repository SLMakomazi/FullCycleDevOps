apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullcycle-api
  labels:
    app: fullcycle-api
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fullcycle-api
  template:
    metadata:
      labels:
        app: fullcycle-api
        version: v1
    spec:
      containers:
      - name: fullcycle-api
        image: fullcycle-api:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: fullcycle-config
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: fullcycle-secrets
              key: mongodb-uri
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
patches:
- path: deployment-patch.yaml