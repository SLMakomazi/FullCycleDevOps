# Pod Disruption Budgets for High Availability
# Ensures minimum number of pods during voluntary disruptions

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: devops-observability
  labels:
    app.kubernetes.io/name: api-pdb
    app.kubernetes.io/component: availability
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: devops-api
---
