server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: devops-observability-api
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/devops_observability}
      database: ${MONGODB_DATABASE:devops_observability}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    tags:
      application: ${spring.application.name}

# OpenTelemetry Configuration
otel:
  sdk:
    disabled: false
    trace:
      sampler:
        ratio: 1.0
    metric:
      export:
        interval: 30s
    logging:
      enabled: true
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
      protocol: grpc
  service:
    name: ${OTEL_SERVICE_NAME:devops-observability-api}
    version: ${OTEL_SERVICE_VERSION:1.0.0}
  resource:
    attributes:
      service.name: ${OTEL_SERVICE_NAME:devops-observability-api}
      service.version: ${OTEL_SERVICE_VERSION:1.0.0}
      deployment.environment: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    com.fullcycle.devops: INFO
    org.springframework.data.mongodb: DEBUG
    io.opentelemetry: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/devops_observability}

---
spring:
  config:
    activate:
      on-profile: kubernetes
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb-service:27017/devops_observability}
