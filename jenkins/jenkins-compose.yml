services:
  jenkins:
    image: jenkins/jenkins:lts

    container_name: jenkins

    user: root  

    ports:
      - "8081:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home

      # Docker socket (CRITICAL)
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - jenkins-network

volumes:
  jenkins_home:

networks:
  jenkins-network:
