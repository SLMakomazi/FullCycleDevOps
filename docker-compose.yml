version: '3.8'

networks:
  monitoring:
    driver: bridge
  logging:
    driver: bridge
  database:
    driver: bridge
  devops:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  opensearch_data:
    driver: local
  graylog_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  bamboo_data:
    driver: local
  rancher_data:
    driver: local
  tempo_data:
    driver: local
  otel_data:
    driver: local
  traefik_data:
    driver: local
  argocd_data:
    driver: local

services:
  # Spring Boot API Application
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: devops-api
    networks:
      - database
      - monitoring
      - logging
      - devops
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MONGODB_URI=mongodb://mongodb:27017/devops_observability
      - MONGODB_DATABASE=devops_observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=devops-observability-api
      - OTEL_SERVICE_VERSION=1.0.0
    depends_on:
      - mongodb
    restart: unless-stopped
    volumes:
      - ./api/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    networks:
      - database
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
      - MONGO_INITDB_DATABASE=devops_observability
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # OpenSearch for Graylog
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    networks:
      - logging
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=StrongPassword123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Graylog Server
  graylog:
    image: graylog/graylog:5.2.4
    container_name: graylog
    networks:
      - logging
      - devops
    ports:
      - "9000:9000"
      - "12201:12201/udp"
      - "1514:1514/udp"
      - "1514:1514"
    environment:
      - GRAYLOG_PASSWORD_SECRET=somepasswordpepper
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9000/
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://mongodb:27017/graylog
    depends_on:
      - opensearch
      - mongodb
    volumes:
      - graylog_data:/usr/share/graylog/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Filebeat for log shipping
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.2
    container_name: filebeat
    networks:
      - logging
    user: root
    environment:
      - setup.kibana.host=kibana:5601
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./api/logs:/var/log/app:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - graylog
    restart: unless-stopped
    command: filebeat -e -strict.perms=false

  # Prometheus Server
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    networks:
      - monitoring
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:10.2.4
    container_name: grafana
    networks:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Bamboo Server (simplified setup)
  bamboo:
    image: atlassian/bamboo:8.2.2
    container_name: bamboo
    networks:
      - devops
    ports:
      - "8085:8085"
      - "54663:54663"
    environment:
      - BAMBOO_HOME=/var/atlassian/application-data/bamboo
    volumes:
      - bamboo_data:/var/atlassian/application-data/bamboo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # Rancher Server (simplified - requires additional setup)
  rancher:
    image: rancher/rancher:v2.8.0
    container_name: rancher
    networks:
      - devops
    ports:
      - "80:80"
      - "443:443"
    privileged: true
    environment:
      - CATTLE_BOOTSTRAP_PASSWORD=rancher123
    volumes:
      - rancher_data:/var/lib/rancher
    restart: unless-stopped
    command: --acme-domain localhost

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.93.0
    container_name: otel-collector
    networks:
      - monitoring
      - logging
      - devops
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter
      - "13133:13133" # Health check
      - "55679:55679" # Zpages
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - otel_data:/var/log/otelcol
      - ./api/logs:/var/log/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Grafana Tempo for distributed tracing
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    networks:
      - monitoring
      - devops
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4318"   # OTLP gRPC (alternative port)
      - "9095:9095"   # Tempo gRPC
      - "7946:7946"   # Memberlist
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Traefik API Gateway and Ingress Controller
  traefik:
    image: traefik:v3.1.2
    container_name: traefik
    networks:
      - monitoring
      - logging
      - devops
    ports:
      - "80:80"        # HTTP
      - "443:443"      # HTTPS
      - "8080:8080"    # Dashboard
      - "8082:8082"    # Metrics
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.metrics.address=:8082"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addentrypointslabels=true"
      - "--metrics.prometheus.addserviceslabels=true"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.format=json"
      - "--log.level=INFO"
      - "--log.filepath=/var/log/traefik/traefik.log"
      - "--log.format=json"
      - "--global.checknewversion=true"
      - "--global.sendanonymoususage=false"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@devops-observability.local"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic-config.yml:/etc/traefik/dynamic/dynamic-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/etc/traefik
      - ./logs/traefik:/var/log/traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$apr1$6a9t8j3p$J5X3F9gQ2k8w7x4r1y2z3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ArgoCD GitOps Platform
  argocd:
    image: argoproj/argocd:v2.9.5
    container_name: argocd
    networks:
      - devops
    ports:
      - "8086:8080"   # ArgoCD UI
      - "8087:8081"   # ArgoCD API
    command:
      - "argocd-server"
      - "--insecure"
      - "--staticassets"
      - "--repo-server"
      - "argocd-repo-server"
      - "--redis"
      - "redis:6379"
    environment:
      - ARGOCD_SERVER_INSECURE=true
    volumes:
      - argocd_data:/app/data
      - ./argocd/argocd-cm.yaml:/app/config/argocd-cm.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
