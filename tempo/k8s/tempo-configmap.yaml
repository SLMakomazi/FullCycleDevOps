apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: devops-observability
  labels:
    app: tempo
    component: observability
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
      log_level: info

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1_048_576
      max_block_duration: 5m

    compactor:
      compaction:
        compaction_window: 1h
        max_block_bytes: 100_000_000
        block_retention: 24h

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: devops-cluster
      storage:
        path: /tmp/tempo/generator/wal
        remote_write:
          - url: http://prometheus-service:9090/api/v1/write
            send_exemplars: true

    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/blocks
        wal:
          path: /tmp/tempo/wal

    overrides:
      per_tenant_override_config: /etc/tempo/overrides.yaml

    memberlist:
      join_members:
        - tempo-service:7946

    query_frontend:
      search:
        external_backend: elasticsearch
        elasticsearch:
          addresses: ["http://opensearch-service:9200"]
          index_prefix: tempo-
          index_template_pattern: "tempo-{%Y.%m.%d}"
          max_doc_count: 1000
          use_ilm: true
          ilm_policy: "tempo-ilm-policy"

    frontend:
      base_path: /tempo

    querier:
      frontend_worker:
        frontend_address: tempo-service:9095

    admin_api:
      enabled: true

    http:
      read_timeout: 30s
      write_timeout: 30s
      idle_timeout: 120s
      read_header_timeout: 10s
      write_header_timeout: 10s

  overrides.yaml: |
    # Tempo overrides configuration
    # Per-tenant configuration overrides

    overrides:
      per_tenant_override_config: /etc/tempo/overrides.yaml
      
      # Global overrides
      ingestion_rate_limit_bytes: 4194304  # 4MB/s
      ingestion_burst_size_bytes: 8388608    # 8MB
      
      # Trace retention
      retention:
        default: 24h
        per_tenant:
          default: 24h
          devops-observability: 168h  # 7 days for our tenant
      
      # Search configuration
      search:
        external_backend: elasticsearch
        elasticsearch:
          addresses: ["http://opensearch-service:9200"]
          index_prefix: tempo-
          index_template_pattern: "tempo-{%Y.%m.%d}"
          max_doc_count: 1000
          use_ilm: true
          ilm_policy: "tempo-ilm-policy"
      
      # Metrics generator configuration
      metrics_generator:
        registry:
          external_labels:
            source: tempo
            cluster: devops-cluster
        storage:
          path: /tmp/tempo/generator/wal
          remote_write:
            - url: http://prometheus-service:9090/api/v1/write
              send_exemplars: true
