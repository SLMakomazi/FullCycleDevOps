# Tempo overrides configuration
# Per-tenant configuration overrides

overrides:
  per_tenant_override_config: /etc/tempo/overrides.yaml
  
  # Global overrides
  ingestion_rate_limit_bytes: 4194304  # 4MB/s
  ingestion_burst_size_bytes: 8388608    # 8MB
  
  # Trace retention
  retention:
    default: 24h
    per_tenant:
      default: 24h
      devops-observability: 168h  # 7 days for our tenant
  
  # Search configuration
  search:
    external_backend: elasticsearch
    elasticsearch:
      addresses: ["http://opensearch:9200"]
      index_prefix: tempo-
      index_template_pattern: "tempo-{%Y.%m.%d}"
      max_doc_count: 1000
      use_ilm: true
      ilm_policy: "tempo-ilm-policy"
  
  # Metrics generator configuration
  metrics_generator:
    registry:
      external_labels:
        source: tempo
        cluster: devops-cluster
    storage:
      path: /tmp/tempo/generator/wal
      remote_write:
        - url: http://prometheus:9090/api/v1/write
          send_exemplars: true
