# Traefik Dynamic Configuration
# Middleware and routing configuration

http:
  middlewares:
    # Security headers middleware
    security-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          X-XSS-Protection: "1; mode=block"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Strict-Transport-Security: "max-age=31536000; includeSubDomains"
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:"

    # Rate limiting middleware
    rate-limit:
      rateLimit:
        average: 100
        period: 1m
        burst: 200

    # Authentication middleware for sensitive endpoints
    basic-auth:
      basicAuth:
        users:
          - "admin:$apr1$6a9t8j3p$J5X3F9gQ2k8w7x4r1y2z3"

    # CORS middleware
    cors:
      headers:
        accessControlAllowCredentials: true
        accessControlAllowHeaders:
          - "*"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowOriginList:
          - "*"
        accessControlMaxAge: 86400

    # Compression middleware
    compress:
      compress:
        excludedContentTypes:
          - text/event-stream
          - application/grpc
        minResponseBodyBytes: 1024

    # Retry middleware
    retry:
      retry:
        attempts: 3
        initialInterval: 100ms

    # Circuit breaker middleware
    circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.5 || ResponseCodeRatio(500, 600, 0, 600) > 0.5"
        checkPeriod: 1s
        fallbackDuration: 10s

    # Buffering middleware for large uploads
    buffering:
      buffering:
        maxRequestBodyBytes: 10485760  # 10MB
        memRequestBodyBytes: 1048576   # 1MB
        maxResponseBodyBytes: 10485760
        memResponseBodyBytes: 1048576
        retryExpression: "IsNetworkError() && Attempts() < 2"

  routers:
    # API router
    api-router:
      entryPoints:
        - websecure
      rule: "Host(`api.localhost`) || Host(`api.devops-observability.local`)"
      service: api-service
      middlewares:
        - security-headers
        - cors
        - rate-limit
        - compress
      tls:
        certResolver: letsencrypt

    # Grafana router
    grafana-router:
      entryPoints:
        - websecure
      rule: "Host(`grafana.localhost`) || Host(`grafana.devops-observability.local`)"
      service: grafana-service
      middlewares:
        - security-headers
        - basic-auth
        - compress
      tls:
        certResolver: letsencrypt

    # Prometheus router
    prometheus-router:
      entryPoints:
        - websecure
      rule: "Host(`prometheus.localhost`) || Host(`prometheus.devops-observability.local`)"
      service: prometheus-service
      middlewares:
        - security-headers
        - basic-auth
        - compress
      tls:
        certResolver: letsencrypt

    # Graylog router
    graylog-router:
      entryPoints:
        - websecure
      rule: "Host(`graylog.localhost`) || Host(`graylog.devops-observability.local`)"
      service: graylog-service
      middlewares:
        - security-headers
        - compress
      tls:
        certResolver: letsencrypt

    # Tempo router
    tempo-router:
      entryPoints:
        - websecure
      rule: "Host(`tempo.localhost`) || Host(`tempo.devops-observability.local`)"
      service: tempo-service
      middlewares:
        - security-headers
        - compress
      tls:
        certResolver: letsencrypt

    # Traefik dashboard router
    dashboard-router:
      entryPoints:
        - websecure
      rule: "Host(`traefik.localhost`) || Host(`traefik.devops-observability.local`)"
      service: api@internal
      middlewares:
        - security-headers
        - basic-auth
      tls:
        certResolver: letsencrypt

    # Metrics router
    metrics-router:
      entryPoints:
        - metrics
      rule: "PathPrefix(`/metrics`)"
      service: prometheus@internal

  services:
    # API service load balancer
    api-service:
      loadBalancer:
        servers:
          - url: "http://api:8080"
        healthCheck:
          path: "/actuator/health"
          interval: "10s"
          timeout: "3s"
        passHostHeader: true
        sticky:
          cookie:
            name: "api-sticky"
            secure: true
            httpOnly: true

    # Grafana service load balancer
    grafana-service:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
        healthCheck:
          path: "/api/health"
          interval: "10s"
          timeout: "3s"

    # Prometheus service load balancer
    prometheus-service:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"
        healthCheck:
          path: "/-/healthy"
          interval: "10s"
          timeout: "3s"

    # Graylog service load balancer
    graylog-service:
      loadBalancer:
        servers:
          - url: "http://graylog:9000"
        healthCheck:
          path: "/api/"
          interval: "10s"
          timeout: "3s"

    # Tempo service load balancer
    tempo-service:
      loadBalancer:
        servers:
          - url: "http://tempo:3200"
        healthCheck:
          path: "/ready"
          interval: "10s"
          timeout: "3s"

tls:
  options:
    modern:
      minVersion: "VersionTLS12"
      cipherSuites:
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
      sniStrict: true
      preferServerCipherSuites: true

  stores:
    default:
      defaultCertificate:
        certFile: "/etc/traefik/certs/default.crt"
        keyFile: "/etc/traefik/certs/default.key"
