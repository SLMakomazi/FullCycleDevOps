apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: devops-observability
  labels:
    app: traefik
    component: ingress
data:
  traefik.yml: |
    # Traefik Configuration
    # API Gateway and Ingress Controller

    api:
      dashboard: true
      insecure: true
      debug: true

    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        address: ":443"
        http:
          middlewares:
            - security-headers@file
            - rate-limit@file
          tls:
            options: modern@file
            certResolver: letsencrypt
      metrics:
        address: ":8082"

    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        allowExternalNameServices: true
        ingressClass: traefik
        namespaces:
          - devops-observability
          - monitoring
          - traefik
      kubernetesIngress:
        allowCrossNamespace: true
        allowExternalNameServices: true
        ingressClass: traefik
        namespaces:
          - devops-observability
          - monitoring
          - traefik
      file:
        directory: /etc/traefik/dynamic
        watch: true

    metrics:
      prometheus:
        addEntryPointsLabels: true
        addServicesLabels: true
        manualRouting: true
        entryPoint: metrics

    tracing:
      jaeger:
        samplingServerURL: "http://tempo-service:14268/api/sampling"
        localAgentHostPort: "tempo-service:6831"
        samplingType: "const"
        samplingParam: 1.0

    accessLog:
      filePath: "/var/log/traefik/access.log"
      format: json
      fields:
        defaultMode: keep
        names:
          ClientUsername: drop
          RequestHost: keep
          RequestPort: keep
          RequestMethod: keep
          RequestPath: keep
          RequestProtocol: keep
          RequestScheme: keep
          RequestHost: keep
          RequestPort: keep
          RequestPath: keep
          RequestMethod: keep
          RequestProtocol: keep
          RequestScheme: keep
          RequestQuery: keep
          RequestRemoteAddr: keep
          RequestReferer: keep
          RequestUserAgent: keep
          RequestContentSize: keep
          ResponseStatusCode: keep
          ResponseContentSize: keep
          ResponseHeaders: keep
          RequestHeaders: keep
          Duration: keep
          StartUTC: keep
          Timestamp: keep
        headers:
          defaultMode: keep
          names:
            User-Agent: keep
            Authorization: drop
            Content-Type: keep

    log:
      level: INFO
      filePath: "/var/log/traefik/traefik.log"
      format: json

    pilot:
      token: ""

    experimental:
      plugins:
        traefik-plugin-redis:
          moduleName: "github.com/traefik/traefik-plugin-redis"
          version: "v0.2.1"

    certificatesResolvers:
      letsencrypt:
        acme:
          email: "admin@devops-observability.local"
          storage: "/etc/traefik/acme/acme.json"
          httpChallenge:
            entryPoint: web

    global:
      checkNewVersion: true
      sendAnonymousUsage: false

    serversTransport:
      insecureSkipVerify: true
      maxIdleConnsPerHost: 200

  dynamic-config.yml: |
    # Traefik Dynamic Configuration
    # Middleware and routing configuration

    http:
      middlewares:
        # Security headers middleware
        security-headers:
          headers:
            customRequestHeaders:
              X-Forwarded-Proto: "https"
            customResponseHeaders:
              X-Content-Type-Options: "nosniff"
              X-Frame-Options: "DENY"
              X-XSS-Protection: "1; mode=block"
              Referrer-Policy: "strict-origin-when-cross-origin"
              Strict-Transport-Security: "max-age=31536000; includeSubDomains"
              Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:"

        # Rate limiting middleware
        rate-limit:
          rateLimit:
            average: 100
            period: 1m
            burst: 200

        # Authentication middleware for sensitive endpoints
        basic-auth:
          basicAuth:
            users:
              - "admin:$apr1$6a9t8j3p$J5X3F9gQ2k8w7x4r1y2z3"

        # CORS middleware
        cors:
          headers:
            accessControlAllowCredentials: true
            accessControlAllowHeaders:
              - "*"
            accessControlAllowMethods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "OPTIONS"
            accessControlAllowOriginList:
              - "*"
            accessControlMaxAge: 86400

        # Compression middleware
        compress:
          compress:
            excludedContentTypes:
              - text/event-stream
              - application/grpc
            minResponseBodyBytes: 1024

        # Retry middleware
        retry:
          retry:
            attempts: 3
            initialInterval: 100ms

        # Circuit breaker middleware
        circuit-breaker:
          circuitBreaker:
            expression: "NetworkErrorRatio() > 0.5 || ResponseCodeRatio(500, 600, 0, 600) > 0.5"
            checkPeriod: 1s
            fallbackDuration: 10s

      routers:
        # API router
        api-router:
          entryPoints:
            - websecure
          rule: "Host(`api.localhost`) || Host(`api.devops-observability.local`)"
          service: api-service
          middlewares:
            - security-headers
            - cors
            - rate-limit
            - compress
          tls:
            certResolver: letsencrypt

        # Grafana router
        grafana-router:
          entryPoints:
            - websecure
          rule: "Host(`grafana.localhost`) || Host(`grafana.devops-observability.local`)"
          service: grafana-service
          middlewares:
            - security-headers
            - basic-auth
            - compress
          tls:
            certResolver: letsencrypt

        # Prometheus router
        prometheus-router:
          entryPoints:
            - websecure
          rule: "Host(`prometheus.localhost`) || Host(`prometheus.devops-observability.local`)"
          service: prometheus-service
          middlewares:
            - security-headers
            - basic-auth
            - compress
          tls:
            certResolver: letsencrypt

        # Graylog router
        graylog-router:
          entryPoints:
            - websecure
          rule: "Host(`graylog.localhost`) || Host(`graylog.devops-observability.local`)"
          service: graylog-service
          middlewares:
            - security-headers
            - compress
          tls:
            certResolver: letsencrypt

        # Tempo router
        tempo-router:
          entryPoints:
            - websecure
          rule: "Host(`tempo.localhost`) || Host(`tempo.devops-observability.local`)"
          service: tempo-service
          middlewares:
            - security-headers
            - compress
          tls:
            certResolver: letsencrypt

        # Traefik dashboard router
        dashboard-router:
          entryPoints:
            - websecure
          rule: "Host(`traefik.localhost`) || Host(`traefik.devops-observability.local`)"
          service: api@internal
          middlewares:
            - security-headers
            - basic-auth
          tls:
            certResolver: letsencrypt

      services:
        # API service load balancer
        api-service:
          loadBalancer:
            servers:
              - url: "http://devops-api-service:8080"
            healthCheck:
              path: "/actuator/health"
              interval: "10s"
              timeout: "3s"
            passHostHeader: true
            sticky:
              cookie:
                name: "api-sticky"
                secure: true
                httpOnly: true

        # Grafana service load balancer
        grafana-service:
          loadBalancer:
            servers:
              - url: "http://grafana-service:3000"
            healthCheck:
              path: "/api/health"
              interval: "10s"
              timeout: "3s"

        # Prometheus service load balancer
        prometheus-service:
          loadBalancer:
            servers:
              - url: "http://prometheus-service:9090"
            healthCheck:
              path: "/-/healthy"
              interval: "10s"
              timeout: "3s"

        # Graylog service load balancer
        graylog-service:
          loadBalancer:
            servers:
              - url: "http://graylog-service:9000"
            healthCheck:
              path: "/api/"
              interval: "10s"
              timeout: "3s"

        # Tempo service load balancer
        tempo-service:
          loadBalancer:
            servers:
              - url: "http://tempo-service:3200"
            healthCheck:
              path: "/ready"
              interval: "10s"
              timeout: "3s"

    tls:
      options:
        modern:
          minVersion: "VersionTLS12"
          cipherSuites:
            - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
            - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
            - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
          sniStrict: true
          preferServerCipherSuites: true
