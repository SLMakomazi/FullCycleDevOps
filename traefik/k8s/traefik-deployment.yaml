apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: devops-observability
  labels:
    app: traefik
    component: ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
        component: ingress
    spec:
      serviceAccountName: traefik
      terminationGracePeriodSeconds: 60
      containers:
      - name: traefik
        image: traefik:v3.1.2
        args:
          - "--api.insecure=true"
          - "--providers.kubernetescrd.allowcrossnamespace=true"
          - "--providers.kubernetescrd.allowexternalsnameservices=true"
          - "--providers.kubernetescrd.ingressclass=traefik"
          - "--providers.kubernetesingress.allowcrossnamespace=true"
          - "--providers.kubernetesingress.allowexternalsnameservices=true"
          - "--providers.kubernetesingress.ingressclass=traefik"
          - "--entrypoints.web.address=:80"
          - "--entrypoints.websecure.address=:443"
          - "--entrypoints.metrics.address=:8082"
          - "--metrics.prometheus=true"
          - "--metrics.prometheus.addentrypointslabels=true"
          - "--metrics.prometheus.addserviceslabels=true"
          - "--accesslog=true"
          - "--accesslog.filepath=/var/log/traefik/access.log"
          - "--accesslog.format=json"
          - "--log.level=INFO"
          - "--log.filepath=/var/log/traefik/traefik.log"
          - "--log.format=json"
          - "--global.checknewversion=true"
          - "--global.sendanonymoususage=false"
          - "--certificatesresolvers.letsencrypt.acme.email=admin@devops-observability.local"
          - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
          - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
          - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
          - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
          - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        ports:
          - name: web
            containerPort: 80
            protocol: TCP
          - name: websecure
            containerPort: 443
            protocol: TCP
          - name: metrics
            containerPort: 8082
            protocol: TCP
          - name: dashboard
            containerPort: 8080
            protocol: TCP
        volumeMounts:
          - name: config-volume
            mountPath: /etc/traefik/traefik.yml
            subPath: traefik.yml
            readOnly: true
          - name: config-volume
            mountPath: /etc/traefik/dynamic/dynamic-config.yml
            subPath: dynamic-config.yml
            readOnly: true
          - name: acme-volume
            mountPath: /etc/traefik/acme
          - name: logs-volume
            mountPath: /var/log/traefik
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /ping
            port: dashboard
          initialDelaySeconds: 30
          periodSeconds: 30
          timeout: 10s
        readinessProbe:
          httpGet:
            path: /ping
            port: dashboard
          initialDelaySeconds: 10
          periodSeconds: 15
          timeout: 10s
        securityContext:
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
      volumes:
      - name: config-volume
        configMap:
          name: traefik-config
      - name: acme-volume
        persistentVolumeClaim:
          claimName: traefik-acme-pvc
      - name: logs-volume
        persistentVolumeClaim:
          claimName: traefik-logs-pvc
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - traefik
                topologyKey: kubernetes.io/hostname
