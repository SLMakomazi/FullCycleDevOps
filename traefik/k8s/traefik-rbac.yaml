apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: devops-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - endpoints
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
      - ingressclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses/status
    verbs:
      - update
  - apiGroups:
      - traefik.io
    resources:
      - middlewares
      - middlewaretcp
      - ingressroutes
      - ingressroutetcps
      - ingressrouteudp
      - serverstransports
      - serverstransporttcps
      - tlsstores
      - tlsoptions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - traefik.io
    resources:
      - middlewares/status
      - middlewaretcp/status
      - ingressroutes/status
      - ingressroutetcps/status
      - ingressrouteudp/status
      - serverstransports/status
      - serverstransporttcps/status
      - tlsstores/status
      - tlsoptions/status
    verbs:
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: devops-observability
