# Bamboo CI/CD Pipeline Configuration
# This file defines the complete CI/CD pipeline for the DevOps & Observability Platform

version: 2

# Global variables
variables:
  docker_registry: "your-registry.com"
  app_name: "devops-observability-api"
  k8s_namespace: "devops-observability"

# Plan definition
plan:
  key: DEVOPS
  name: "DevOps Observability Platform CI/CD"
  description: "Complete CI/CD pipeline for Spring Boot API deployment"

# Stages
stages:
  - Build:
      manual: false
      final: false
  - Test:
      manual: false
      final: false
      - Build
  - Security:
      manual: false
      final: false
      - Test
  - Package:
      manual: false
      final: false
      - Security
  - Deploy:
      manual: true
      final: true
      - Package

# Jobs
jobs:
  # Build Stage
  - Build:
      key: BUILD
      name: "Build Application"
      description: "Build the Spring Boot application"
      tasks:
        - checkout:
            repository: devops-observability
            branch: master
            path: .
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Building Spring Boot application..."
                cd api
                mvn clean compile -B -V
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Running unit tests..."
                cd api
                mvn test -B
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Generating test reports..."
                cd api
                mvn jacoco:report
        
        - parse-tests:
            results:
              - api/target/surefire-reports/*.xml
        
        - publish-test-results:
            results:
              - api/target/surefire-reports/*.xml

  # Test Stage
  - Integration-Tests:
      key: TEST
      name: "Integration Tests"
      description: "Run integration tests with testcontainers"
      tasks:
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Running integration tests..."
                cd api
                mvn verify -P integration-tests -B
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Running performance tests..."
                cd api
                mvn gatling:test -B
        
        - publish-test-results:
            results:
              - api/target/failsafe-reports/*.xml

  # Security Stage
  - Security-Scan:
      key: SECURITY
      name: "Security Scanning"
      description: "Run security scans and vulnerability checks"
      tasks:
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Running dependency vulnerability scan..."
                cd api
                mvn dependency-check:check -B
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Running SAST scan..."
                cd api
                mvn sonar:sonar -Dsonar.projectKey=devops-observability-api -B
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Running container image scan..."
                docker build -t ${bamboo.buildResultKey} ./api
                trivy image --format json --output trivy-report.json ${bamboo.buildResultKey}

  # Package Stage
  - Package-and-Publish:
      key: PACKAGE
      name: "Package and Publish"
      description: "Build Docker image and publish to registry"
      tasks:
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Building production JAR..."
                cd api
                mvn clean package -DskipTests -B
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Building Docker image..."
                cd api
                docker build -t ${docker_registry}/${app_name}:${bamboo.buildNumber} .
                docker tag ${docker_registry}/${app_name}:${bamboo.buildNumber} ${docker_registry}/${app_name}:latest
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Pushing Docker image to registry..."
                docker login ${docker_registry} -u ${bamboo.docker_username} -p ${bamboo.docker_password}
                docker push ${docker_registry}/${app_name}:${bamboo.buildNumber}
                docker push ${docker_registry}/${app_name}:latest
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Creating deployment artifacts..."
                mkdir -p deployment-artifacts
                cp -r k8s/* deployment-artifacts/
                sed -i "s|image: devops-observability-api:latest|image: ${docker_registry}/${app_name}:${bamboo.buildNumber}|g" deployment-artifacts/api/api-deployment.yaml
                tar -czf deployment-artifacts-${bamboo.buildNumber}.tar.gz deployment-artifacts/
        
        - artifact:
            name: "Deployment Artifacts"
            location: .
            pattern: "deployment-artifacts-${bamboo.buildNumber}.tar.gz"
            shared: false

  # Deploy Stage
  - Deploy-to-Kubernetes:
      key: DEPLOY
      name: "Deploy to Kubernetes"
      description: "Deploy application to Kubernetes cluster"
      tasks:
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Setting up kubectl..."
                echo "${bamboo.kubeconfig}" | base64 -d > kubeconfig
                export KUBECONFIG=kubeconfig
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Extracting deployment artifacts..."
                tar -xzf deployment-artifacts-${bamboo.buildNumber}.tar.gz
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Deploying to Kubernetes..."
                kubectl apply -f deployment-artifacts/namespaces/ --validate=false
                kubectl apply -f deployment-artifacts/mongodb/ --validate=false
                kubectl apply -f deployment-artifacts/api/ --validate=false
                kubectl apply -f deployment-artifacts/prometheus/ --validate=false
                kubectl apply -f deployment-artifacts/grafana/ --validate=false
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Waiting for deployment to be ready..."
                kubectl rollout status deployment/devops-api -n ${k8s_namespace} --timeout=300s
                kubectl rollout status deployment/mongodb -n ${k8s_namespace} --timeout=300s
                kubectl rollout status deployment/prometheus -n ${k8s_namespace} --timeout=300s
                kubectl rollout status deployment/grafana -n ${k8s_namespace} --timeout=300s
        
        - script:
            interpreter: SHELL
            scripts:
              - |-
                echo "Running smoke tests..."
                kubectl wait --for=condition=ready pod -l app=devops-api -n ${k8s_namespace} --timeout=300s
                API_URL=$(kubectl get svc devops-api-service -n ${k8s_namespace} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
                if [ -z "$API_URL" ]; then
                  API_URL="localhost:8080"
                fi
                curl -f http://$API_URL/actuator/health || exit 1

# Deployment environments
environments:
  - name: "Development"
    key: DEV
    deployment:
      type: "automatic"
      branch: "develop"
    
  - name: "Staging"
    key: STAGE
    deployment:
      type: "manual"
      branch: "main"
    
  - name: "Production"
    key: PROD
    deployment:
      type: "manual"
      branch: "main"
      requires:
        - STAGE

# Notifications
notifications:
  - type: email
    events:
      - build_completed
      - build_failed
    recipients:
      - devops-team@company.com
  
  - type: slack
    webhook: ${bamboo.slack_webhook}
    events:
      - build_completed
      - build_failed
    channel: "#devops-cicd"
