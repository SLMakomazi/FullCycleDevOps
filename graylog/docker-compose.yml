version: '3.8'

services:
  graylog:
    image: graylog/graylog:5.2.4
    container_name: graylog
    ports:
      - "9000:9000"      # Web interface
      - "12201:12201/udp"  # GELF UDP input
      - "1514:1514/udp"    # Syslog UDP input
      - "1514:1514"        # Syslog TCP input
    environment:
      - GRAYLOG_PASSWORD_SECRET=somepasswordpepper
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9000/
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://mongodb:27017/graylog
    volumes:
      - graylog_data:/usr/share/graylog/data
      - ./graylog.conf:/usr/share/graylog/data/config/graylog.conf:ro
      - ./log4j2.xml:/usr/share/graylog/data/config/log4j2.xml:ro
      - ./logs/graylog:/var/log/graylog
    depends_on:
      - opensearch
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  graylog_data:
    driver: local

networks:
  default:
    external:
      name: logging
