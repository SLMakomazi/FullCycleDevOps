# Graylog Configuration File
# This configuration file is used by Graylog server

# Server settings
is_master = true
node_id_file = /usr/share/graylog/data/config/node-id
password_secret = ${GRAYLOG_PASSWORD_SECRET:somepasswordpepper}
root_password_sha2 = ${GRAYLOG_ROOT_PASSWORD_SHA2:8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918}
root_email = ""
root_timezone = UTC

# HTTP settings
http_bind_address = 0.0.0.0
http_port = 9000
http_publish_uri = ${GRAYLOG_HTTP_EXTERNAL_URI:http://127.0.0.1:9000/}
http_enable_cors = true
http_enable_gzip = true

# Elasticsearch/OpenSearch settings
elasticsearch_hosts = ${GRAYLOG_ELASTICSEARCH_HOSTS:http://opensearch:9200}
elasticsearch_max_docs_per_index = 20000000
elasticsearch_max_number_of_indices = 20
elasticsearch_shards = 4
elasticsearch_replicas = 0
elasticsearch_index_prefix = graylog
elasticsearch_template_name = graylog-internal
elasticsearch_analyzer = standard
elasticsearch_disable_version_check = true

# MongoDB settings
mongodb_uri = ${GRAYLOG_MONGODB_URI:mongodb://mongodb:27017/graylog}
mongodb_max_connections = 1000
mongodb_threads_allowed_to_block_multiplier = 5

# Message journal settings
message_journal_dir = /usr/share/graylog/data/journal
message_journal_max_age = 12h
message_journal_max_size = 5gb

# Process buffer settings
processbuffer_processors = 5
processbuffer_output_module_class = org.graylog2.buffers.outputs.OutputBufferProcessor
processbuffer_output_type = org.graylog2.buffers.outputs.MemoryOutputBuffer
processbuffer_output_batch_size = 500
processbuffer_output_flush_interval = 1

# Input buffer settings
inputbuffer_processors = 2
inputbuffer_module_class = org.graylog2.buffers.inputs.ProcessBufferInput
inputbuffer_type = org.graylog2.buffers.inputs.MemoryInputBuffer
inputbuffer_batch_size = 500
inputbuffer_flush_interval = 1

# Ring buffer settings
ringbuffer_size = 65536

# Content pack settings
content_packs_dir = /usr/share/graylog/data/contentpacks
content_packs_auto_load = grok-patterns

# Plugin settings
plugin_dir = /usr/share/graylog/plugin
rest_listen_uri = http://0.0.0.0:9000/api/

# Security settings
trusted_proxies = 127.0.0.1/32, 0:0:0:0:0:0:0:1/128

# Logging settings
log4j_config_file = /etc/graylog/log4j2.xml
log_rotation_policy = count:10
log_retention_policy = time:30d

# Performance settings
stream_processing_max_threads = 8
output_batch_size = 500
output_flush_interval = 1
