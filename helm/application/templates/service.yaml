apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-observability-api.fullname" . }}-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devops-observability-api.labels" . | nindent 4 }}
  {{- with .Values.customAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "devops-observability-api.selectorLabels" . | nindent 4 }}
