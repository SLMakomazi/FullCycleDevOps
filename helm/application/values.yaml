# Default values for devops-observability-api Helm chart

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "standard"

# Replica count
replicaCount: 2

# Image settings
image:
  repository: devops-observability-api
  pullPolicy: IfNotPresent
  tag: "latest"

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

# Service settings
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# Ingress settings
ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: api.localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource settings
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Environment variables
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "kubernetes"
  - name: MONGODB_URI
    value: "mongodb://mongodb-service:27017/devops_observability"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector-service:4317"
  - name: OTEL_SERVICE_NAME
    value: "devops-observability-api"
  - name: OTEL_SERVICE_VERSION
    value: "1.0.0"

# Extra environment variables from ConfigMaps or Secrets
envFrom: []

# Volume mounts
volumeMounts: []

# Volumes
volumes: []

# Persistent volume claims
persistentVolumeClaims:
  logs:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClass: "standard"
    annotations: {}

# Health checks
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  namespace: ""
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network policies
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    from:
      - namespaceSelector:
          matchLabels:
            name: devops-observability
      - namespaceSelector:
          matchLabels:
            name: argocd
  egress:
    enabled: true
    to:
      - namespaceSelector:
          matchLabels:
            name: devops-observability

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60

# Pod anti-affinity
podAntiAffinity:
  enabled: true
  topologyKey: "kubernetes.io/hostname"

# Init containers
initContainers: []

# Sidecar containers
sidecars: []

# ConfigMaps
configMaps: {}

# Secrets
secrets: {}

# Custom labels and annotations
customLabels: {}
customAnnotations: {}
