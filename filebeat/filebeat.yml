filebeat.inputs:
- type: log
  enabled: true
  paths:
    - /var/log/app/*.log
  fields:
    service: devops-api
    environment: docker
  fields_under_root: true
  multiline.pattern: '^\d{4}-\d{2}-\d{2}'
  multiline.negate: true
  multiline.match: after
  json.keys_under_root: true
  json.add_error_key: true
  json.message_key: message

- type: container
  enabled: true
  paths:
    - '/var/lib/docker/containers/*/*.log'
  processors:
    - add_docker_metadata:
        host: "unix:///var/run/docker.sock"
    - decode_json_fields:
        fields: ["message"]
        target: ""
        overwrite_keys: true

# Output configuration for Graylog
output.graylog:
  hosts: ["graylog:12201"]
  compression_level: 3
  max_message_size: 1048576
  flush_interval: 1s

# Alternative: Output to Graylog via HTTP
# output.http:
#   hosts: ["graylog:9000"]
#   path: "/gelf"
#   headers:
#     Content-Type: "application/json"
#   template:
#     scheme: http
#     host: "{{.host}}"
#     path: "/gelf"

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~

# Logging configuration
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# Monitoring
monitoring.enabled: false

# Queue settings
queue.mem:
  events: 4096
  flush.min_events: 512
  flush.timeout: 1s

# General settings
name: filebeat-devops
queue.spool:
  file:
    path: "${path.data}/spool.dat"
    size: 100MiB
    write_buffer_size: 10MiB
